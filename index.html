<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App de Almoço</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="icon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <h1>App de Almoço</h1>
    <nav class="tabs">
      <button id="tab-almocar-btn" class="tab-button active" data-tab="almocar">Almoçar</button>
      <button id="tab-cozinha-btn" class="tab-button" data-tab="cozinha">Cozinha</button>
    </nav>
  </header>

  <main id="app-main">
    <!-- Aba Almoçar -->
    <section id="tab-almocar" class="tab active">
      <div id="menu-section" class="card">
        <h2>Cardápio de hoje</h2>
        <div id="menu-content">
          <p class="muted">Ainda não há cardápio registrado para hoje.</p>
        </div>
      </div>

      <div id="order-section" class="card">
        <h2>Quero almoçar hoje</h2>
        <form id="order-form">
          <label for="order-name">Seu nome</label>
          <input type="text" id="order-name" name="orderName" required placeholder="Ex.: Ana - Financeiro" />

          <label for="order-notes">Observação (opcional)</label>
          <input type="text" id="order-notes" name="orderNotes" placeholder="Ex.: sem salada, pouco arroz" />

          <button type="submit" class="btn primary-btn">Confirmar meu almoço</button>
        </form>
        <p id="order-feedback" class="feedback"></p>
      </div>
    </section>

    <!-- Aba Cozinha -->
    <section id="tab-cozinha" class="tab">
      <div id="cozinha-locked" class="card">
        <h2>Entrar na Cozinha</h2>
        <form id="admin-pin-form">
          <label for="admin-pin">PIN da cozinha (4 dígitos)</label>
          <input type="password" id="admin-pin" maxlength="4" pattern="\d{4}" required />

          <label class="checkbox-label">
            <input type="checkbox" id="remember-admin" />
            Manter este acesso neste aparelho
          </label>

          <button type="submit" class="btn primary-btn">Entrar</button>
        </form>
        <p id="admin-pin-feedback" class="feedback"></p>
      </div>

      <div id="cozinha-panel" class="hidden">
        <div class="card">
          <div class="cozinha-panel-header">
            <h2>Configurar cardápio de hoje</h2>
            <button id="admin-logout-btn" class="btn secondary-btn small-btn">Sair deste aparelho</button>
          </div>
          <form id="menu-form">
            <label for="menu-main-dish">Prato principal</label>
            <input type="text" id="menu-main-dish" required placeholder="Ex.: Frango grelhado" />

            <label for="menu-sides">Acompanhamentos</label>
            <input type="text" id="menu-sides" required placeholder="Ex.: Arroz, feijão, salada" />

            <label for="menu-veggie">Opção vegetariana (opcional)</label>
            <input type="text" id="menu-veggie" placeholder="Ex.: Lasanha de berinjela" />

            <label for="menu-price">Valor (R$)</label>
            <input type="number" id="menu-price" min="0" step="0.01" required placeholder="Ex.: 15.00" />

            <label for="menu-notes">Observações (opcional)</label>
            <input type="text" id="menu-notes" placeholder="Ex.: Suco de laranja incluso" />

            <button type="submit" class="btn primary-btn">Salvar cardápio de hoje</button>
          </form>
          <p id="menu-save-feedback" class="feedback"></p>
        </div>

        <div class="card">
          <h2>Pedidos de hoje</h2>
          <p id="orders-summary" class="muted">Nenhum pedido registrado hoje.</p>
          <div class="table-wrapper">
            <table id="orders-table">
              <thead>
                <tr>
                  <th>Nome</th>
                  <th>Observação</th>
                  <th>Pago</th>
                </tr>
              </thead>
              <tbody id="orders-table-body">
                <!-- Linhas geradas via JS -->
              </tbody>
            </table>
          </div>
          <div class="cozinha-actions">
            <button id="clear-orders-btn" class="btn danger-btn small-btn">Limpar pedidos de hoje</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="app-footer">
    <small>&copy; <span id="year"></span> App de Almoço</small>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>

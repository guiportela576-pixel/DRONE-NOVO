<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PREVISÃO DE ALMOÇO 6°BC</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="icon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <h1 style="width:100%;text-align:center;">PREVISÃO DE ALMOÇO 6°BC</h1>
    <nav class="tabs">
      <button id="tab-almocar-btn" class="tab-button active" data-tab="almocar">Almoçar</button>
      <button id="tab-cozinha-btn" class="tab-button" data-tab="cozinha">Cozinha</button>
    </nav>
  </header>

  <main id="app-main">
    <section id="tab-almocar" class="tab active">
      <div id="menu-section" class="card">
        <h2>Cardápio de hoje</h2>
        <div id="menu-content">
          <p class="muted">Ainda não há cardápio registrado para hoje.</p>
        </div>
      </div>

      <div id="order-section" class="card">
        <h2>Quero almoçar hoje</h2>
        <form id="order-form">
          <label for="order-name">Seu nome</label>
          <input type="text" id="order-name" required placeholder="Ex.: Ana - Financeiro" />

          <label class="checkbox-label">
            <input type="checkbox" id="remember-name" />
            Lembrar meu nome neste aparelho
          </label>

          <label for="order-notes">Observação (opcional)</label>
          <input type="text" id="order-notes" placeholder="Ex.: sem salada, pouco arroz" />

          <div class="button-row center">
            <button type="submit" class="btn primary-btn">Confirmar meu almoço</button>
          </div>
        </form>
        <p id="order-feedback" class="feedback"></p>
      </div>
    </section>

    <section id="tab-cozinha" class="tab">
      <div id="cozinha-locked" class="card">
        <h2>Entrar na Cozinha</h2>
        <form id="admin-pin-form">
          <label for="admin-pin">PIN da cozinha (4 dígitos)</label>
          <input type="password" id="admin-pin" maxlength="4" pattern="\d{4}" required />

          <label class="checkbox-label">
            <input type="checkbox" id="remember-admin" />
            Manter este acesso neste aparelho
          </label>

          <div class="button-row center">
            <button type="submit" class="btn primary-btn">Entrar</button>
          </div>
        </form>
        <p id="admin-pin-feedback" class="feedback"></p>
      </div>

      <div id="cozinha-panel" class="hidden">
        <div class="card">
          <div class="cozinha-panel-header">
            <h2>Configurar cardápio de hoje</h2>
            <button id="admin-logout-btn" class="btn secondary-btn small-btn">Sair</button>
          </div>
          <form id="menu-form">
            <label>Prato principal</label>
            <input type="text" id="menu-main-dish" required />

            <label>Acompanhamentos</label>
            <input type="text" id="menu-sides" required />

            <label>Opção vegetariana (opcional)</label>
            <input type="text" id="menu-veggie" />

            <label>Valor (R$)</label>
            <input type="number" id="menu-price" min="0" step="0.01" required />

            <label>Horário limite (opcional)</label>
            <input type="time" id="menu-deadline" />

            <label>Observações (opcional)</label>
            <input type="text" id="menu-notes" />

            <div class="button-row center">
              <button type="submit" class="btn primary-btn">Salvar cardápio de hoje</button>
            </div>
          </form>
          <p id="menu-save-feedback" class="feedback"></p>
        </div>

        <div class="card">
          <h2>Pedidos de hoje</h2>
          <p id="orders-summary" class="muted">Nenhum pedido registrado hoje.</p>
          <div class="table-wrapper">
            <table id="orders-table">
              <thead>
                <tr>
                  <th>Nome</th>
                  <th>Horário</th>
                  <th>Observação</th>
                  <th>Pago</th>
                </tr>
              </thead>
              <tbody id="orders-table-body"></tbody>
            </table>
          </div>
          <div class="button-row center">
            <button id="clear-orders-btn" class="btn danger-btn small-btn">Limpar pedidos de hoje</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="app-footer">
    <small>&copy; <span id="year"></span> PREVISÃO DE ALMOÇO 6°BC</small>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
